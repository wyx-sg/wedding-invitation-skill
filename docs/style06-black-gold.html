<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林知言 & 沈安然 · 婚礼请帖</title>
<link href="https://fonts.font.im/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400;500&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050505;
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 0;
    color: #d4af37;
  }
  .card {
    width: 420px;
    height: 560px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(212,175,55,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(212,175,55,0.06) 0%, transparent 60%),
      #0a0a0a;
    position: relative;
    padding: 28px 30px 26px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    overflow: hidden;
    border: 1px solid rgba(212,175,55,0.25);
    display: flex;
    flex-direction: column;
  }

  /* gold frame */
  .frame-inner {
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(212,175,55,0.4);
    pointer-events: none;
  }
  .frame-outer {
    position: absolute;
    inset: 18px;
    border: 1px solid rgba(212,175,55,0.15);
    pointer-events: none;
  }

  /* corner ornaments */
  .corner-orn {
    position: absolute;
    width: 32px; height: 32px;
    color: #d4af37;
    z-index: 2;
  }
  .corner-orn.tl { top: 22px; left: 22px; }
  .corner-orn.tr { top: 22px; right: 22px; transform: scaleX(-1); }
  .corner-orn.bl { bottom: 22px; left: 22px; transform: scaleY(-1); }
  .corner-orn.br { bottom: 22px; right: 22px; transform: scale(-1,-1); }

  .monogram {
    text-align: center;
    margin-bottom: 12px;
    position: relative; z-index: 2;
    padding-top: 6px;
  }
  .monogram-big {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 300;
    line-height: 0.9;
    color: #d4af37;
    letter-spacing: -2px;
  }
  .monogram-big em {
    font-style: italic;
    font-weight: 400;
    font-size: 44px;
    color: #b8956a;
  }
  .monogram-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 6px;
    color: #d4af37;
    margin-top: 2px;
    opacity: 0.85;
  }

  .photo-frame {
    width: 150px;
    height: 150px;
    margin: 0 auto 14px;
    position: relative;
    z-index: 2;
    border-radius: 50%;
    overflow: hidden;
    box-shadow:
      0 0 0 1px #0a0a0a,
      0 0 0 3px #d4af37,
      0 0 0 4px #0a0a0a,
      0 0 0 5px rgba(212,175,55,0.4),
      0 14px 28px rgba(0,0,0,0.6);
    flex-shrink: 0;
  }
  .photo-frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 12%;
    filter: brightness(0.95) contrast(1.05);
  }

  .names-zh {
    text-align: center;
    font-size: 18px;
    color: #f5e6b5;
    letter-spacing: 6px;
    font-weight: 400;
    margin-bottom: 4px;
    position: relative; z-index: 2;
    font-family: 'Noto Serif SC', serif;
  }
  .names-zh .amp {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #d4af37;
    margin: 0 8px;
    font-size: 17px;
  }
  .names-en {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 4px;
    color: #d4af37;
    margin-bottom: 10px;
    position: relative; z-index: 2;
    opacity: 0.9;
  }

  .gold-bar {
    width: 50px;
    height: 1px;
    background: #d4af37;
    margin: 0 auto 12px;
    position: relative; z-index: 2;
  }
  .gold-bar::before, .gold-bar::after {
    content: '';
    position: absolute;
    top: -2px;
    width: 4px; height: 4px;
    background: #d4af37;
    transform: rotate(45deg);
  }
  .gold-bar::before { left: -7px; }
  .gold-bar::after { right: -7px; }

  .info-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    margin-bottom: 6px;
    position: relative; z-index: 2;
    text-align: center;
    font-size: 11px;
    color: #f5e6b5;
    letter-spacing: 1px;
    line-height: 1.5;
  }
  .info-key {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 10px;
    color: #b8956a;
    letter-spacing: 3px;
    flex-shrink: 0;
    min-width: 52px;
    text-align: right;
  }
  .info-val {
    font-size: 11.5px;
    color: #f5e6b5;
    letter-spacing: 1px;
  }
  .info-val .accent {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #d4af37;
    font-size: 13px;
  }

  .footer {
    text-align: center;
    margin-top: auto;
    position: relative; z-index: 2;
  }
  .footer-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 11px;
    letter-spacing: 7px;
    color: #d4af37;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: #15110d; min-height: 100vh; }
    body { display: flex; align-items: center; justify-content: center; padding: 24px 0; }
    body > .card { box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55); }
  </style></head>
