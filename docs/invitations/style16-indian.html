<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raj Sharma & Priya Verma · Wedding</title>
<link href="https://fonts.font.im/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a0e16; font-family: 'Noto Serif SC', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 420px; height: 560px;
    background: radial-gradient(circle at 50% -10%, #a83344 0%, #7a1f2e 45%, #5a1521 100%);
    color: #f4d8a0;
    position: relative;
    overflow: hidden;
    padding: 24px;
  }
  .border-frame {
    position: absolute; inset: 10px;
    border: 1.5px solid #d4a02a;
    border-radius: 2px;
    pointer-events: none;
  }
  .border-frame::after {
    content: '';
    position: absolute; inset: 4px;
    border: 0.5px solid #d4a02a;
    opacity: 0.6;
  }
  /* Big mandala at top */
  .mandala {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 90px; height: 90px;
    z-index: 2;
  }
  .mandala svg { width: 100%; height: 100%; }
  /* Paisley flourishes on both sides */
  .paisley-left, .paisley-right {
    position: absolute;
    top: 240px;
    width: 56px; height: 110px;
    opacity: 0.5;
    pointer-events: none;
  }
  .paisley-left { left: 14px; }
  .paisley-right { right: 14px; transform: scaleX(-1); }
  .paisley-left svg, .paisley-right svg { width: 100%; height: 100%; }
  /* Bottom lotus row */
  .lotus-row {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    width: 220px; height: 30px;
    opacity: 0.6;
    pointer-events: none;
  }
  .lotus-row svg { width: 100%; height: 100%; }
  .content { position: relative; z-index: 1; padding-top: 124px; text-align: center; }
  .greeting {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 8px;
    color: #e8a042;
    margin-bottom: 6px;
  }
  .photo-wrap {
    width: 150px; height: 150px;
    margin: 8px auto 18px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #d4a02a;
    box-shadow: 0 0 0 4px #5a1521, 0 0 0 5px #d4a02a, 0 0 0 9px #5a1521, 0 0 0 10px #c8843a;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center 12%; }
  .names-zh {
    font-size: 22px;
    letter-spacing: 7px;
    color: #f4d8a0;
    margin-bottom: 4px;
  }
  .names-zh .amp {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #e8a042;
    margin: 0 6px;
  }
  .names-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 4px;
    color: #e8a042;
    margin-bottom: 16px;
  }
  .divider {
    width: 120px;
    height: 1px;
    margin: 0 auto 14px;
    background: linear-gradient(90deg, transparent, #d4a02a, transparent);
  }
  .date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: #f4d8a0;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .date-sub {
    font-size: 10px;
    color: #e8a042;
    letter-spacing: 4px;
  }
  .venue {
    margin-top: 14px;
    font-size: 10.5px;
    color: #f4d8a0;
    letter-spacing: 2px;
    line-height: 1.6;
    opacity: 0.9;
    padding: 0 20px;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: transparent; width: 420px; height: 560px; overflow: hidden; }
    body > .card { box-shadow: none; margin: 0; }
  </style></head>
