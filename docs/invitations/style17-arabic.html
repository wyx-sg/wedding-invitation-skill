<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ahmad Al-Hassan & Layla Al-Farsi · Wedding</title>
<link href="https://fonts.font.im/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a201f; font-family: 'Noto Serif SC', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 420px; height: 560px;
    background: #1d6160;
    color: #f0e0c0;
    position: relative;
    overflow: hidden;
  }
  /* Geometric 8-pointed star tile pattern background */
  .tile-pattern {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent 0 28px, rgba(200,160,64,0.06) 28px 29px),
      repeating-linear-gradient(-45deg, transparent 0 28px, rgba(200,160,64,0.06) 28px 29px);
    pointer-events: none;
  }
  .frame-outer {
    position: absolute; inset: 14px;
    border: 2px solid #c8a040;
  }
  .frame-inner {
    position: absolute; inset: 22px;
    border: 0.5px solid #c8a040;
    opacity: 0.6;
  }
  /* Top arabesque corner ornaments */
  .corner {
    position: absolute;
    width: 50px; height: 50px;
    opacity: 0.85;
  }
  .corner.tl { top: 18px; left: 18px; }
  .corner.tr { top: 18px; right: 18px; transform: scaleX(-1); }
  .corner.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
  .corner.br { bottom: 18px; right: 18px; transform: scale(-1, -1); }
  .corner svg { width: 100%; height: 100%; }

  /* Mihrab arch wrapping the photo */
  .arch-frame {
    position: absolute;
    top: 56px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 240px;
    z-index: 1;
  }
  .arch-frame svg { width: 100%; height: 100%; }

  .content {
    position: relative; z-index: 2;
    padding: 64px 36px 28px;
    text-align: center;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .top-arabic {
    font-family: 'Amiri', serif;
    font-size: 14px;
    color: #c8a040;
    margin-bottom: 4px;
  }
  .top-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 5px;
    color: #c8a040;
  }
  .photo-wrap {
    width: 168px; height: 200px;
    margin: 8px auto 16px;
    clip-path: path('M 0 200 L 0 100 Q 0 0 84 0 Q 168 0 168 100 L 168 200 Z');
    -webkit-clip-path: path('M 0 200 L 0 100 Q 0 0 84 0 Q 168 0 168 100 L 168 200 Z');
    overflow: hidden;
    background: #c8a040;
  }
  .photo-wrap img {
    width: 100%; height: 100%; object-fit: cover; object-position: center 14%;
  }
  .names-zh {
    font-size: 20px;
    letter-spacing: 6px;
    color: #f0e0c0;
    margin-top: 8px;
  }
  .names-zh .amp {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #c8a040;
    margin: 0 4px;
  }
  .names-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 4px;
    color: #c8a040;
    margin-top: 3px;
  }
  .star-divider {
    margin: 14px auto 12px;
    font-size: 12px;
    color: #c8a040;
    letter-spacing: 10px;
  }
  .info {
    font-size: 11px;
    color: #f0e0c0;
    letter-spacing: 3px;
    line-height: 1.8;
    margin-top: auto;
  }
  .info .date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: #c8a040;
    letter-spacing: 3px;
    display: block;
    margin-bottom: 3px;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: transparent; width: 420px; height: 560px; overflow: hidden; }
    body > .card { box-shadow: none; margin: 0; }
  </style>
  <script>
    (function () {
      window.addEventListener('message', function (e) {
        var d = e && e.data;
        if (!d || d.type !== 'set-photo' || !d.url) return;
        var img = document.getElementById('main-photo');
        if (img) img.setAttribute('src', d.url);
      });
      try { parent.postMessage({ type: 'photo-iframe-ready', id: "style17-arabic" }, '*'); } catch (_) {}
    })();
  </script></head>
<body>
<div class="card">
  <div class="tile-pattern"></div>
  <div class="frame-outer"></div>
  <div class="frame-inner"></div>

  <!-- Arabesque corner ornaments (4 corners) -->
  <div class="corner tl">
    <svg viewBox="0 0 50 50" fill="none">
      <path d="M0 50 Q0 20 12 12 Q20 4 50 0" stroke="#c8a040" stroke-width="1.4" fill="none"/>
      <path d="M8 50 Q8 26 18 18 Q26 10 50 8" stroke="#c8a040" stroke-width="0.7" fill="none" opacity="0.6"/>
      <circle cx="14" cy="14" r="2.5" fill="#c8a040"/>
      <path d="M18 14 Q22 10 26 14 Q22 18 18 14" stroke="#c8a040" stroke-width="0.6" fill="none"/>
    </svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 50 50" fill="none">
      <path d="M0 50 Q0 20 12 12 Q20 4 50 0" stroke="#c8a040" stroke-width="1.4" fill="none"/>
      <path d="M8 50 Q8 26 18 18 Q26 10 50 8" stroke="#c8a040" stroke-width="0.7" fill="none" opacity="0.6"/>
      <circle cx="14" cy="14" r="2.5" fill="#c8a040"/>
      <path d="M18 14 Q22 10 26 14 Q22 18 18 14" stroke="#c8a040" stroke-width="0.6" fill="none"/>
    </svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 50 50" fill="none">
      <path d="M0 50 Q0 20 12 12 Q20 4 50 0" stroke="#c8a040" stroke-width="1.4" fill="none"/>
      <circle cx="14" cy="14" r="2.5" fill="#c8a040"/>
    </svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 50 50" fill="none">
      <path d="M0 50 Q0 20 12 12 Q20 4 50 0" stroke="#c8a040" stroke-width="1.4" fill="none"/>
      <circle cx="14" cy="14" r="2.5" fill="#c8a040"/>
    </svg>
  </div>

  <div class="content">
    <div class="top-arabic">— الزفاف —</div>
    <div class="top-en">SAVE THE DATE</div>

    <div class="photo-wrap">
      <img id="main-photo" src="../photos/style17-arabic.jpg" alt="couple">
    </div>

    <div class="names-zh">Ahmad<span class="amp">&</span>Layla</div>
    <div class="names-en">AHMAD AL-HASSAN · LAYLA AL-FARSI</div>

    <div class="star-divider">✦ ✦ ✦</div>

    <div class="info">
      <span class="date">October 1, 2099</span>
      Monday · 18:00<br>
      Dubai · Jumeirah Beach Road
    </div>
  </div>
</div>
</body>
</html>
