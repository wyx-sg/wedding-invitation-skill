<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Johnson & Maria Garcia · Wedding</title>
<link href="https://fonts.font.im/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a2a26;
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 0;
  }
  .card {
    width: 420px;
    height: 560px;
    background:
      linear-gradient(180deg, #f4ead8 0%, #ecd9b8 65%, #d4a37a 100%);
    position: relative;
    padding: 18px 30px 18px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    overflow: hidden;
    color: #5a3a28;
    display: flex;
    flex-direction: column;
  }
  /* big sun disc top right — saturated terracotta */
  .sun {
    position: absolute;
    top: -70px;
    right: -70px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, #f4a05a 0%, #c4683a 50%, transparent 75%);
    opacity: 0.75;
    pointer-events: none;
  }
  /* horizon line — Mediterranean signature */
  .horizon {
    position: absolute;
    left: 0; right: 0;
    top: 53%;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #8b5a3e 20%, #8b5a3e 80%, transparent 100%);
    opacity: 0.35;
    pointer-events: none;
  }
  /* olive branch bottom — bigger, more visible */
  .olive {
    position: absolute;
    bottom: 6px; left: -12px;
    width: 220px; height: 90px;
    opacity: 0.75;
    pointer-events: none;
  }
  .olive svg { width: 100%; height: 100%; }
  .olive-right {
    position: absolute;
    bottom: 6px; right: -12px;
    width: 220px; height: 90px;
    opacity: 0.75;
    transform: scaleX(-1);
    pointer-events: none;
  }
  .olive-right svg { width: 100%; height: 100%; }

  .leaf-corner {
    position: absolute;
    top: 14px;
    left: 14px;
    width: 70px; height: 70px;
    opacity: 0.7;
    color: #5a7a5e;
    pointer-events: none;
  }
  .leaf-corner svg { width: 100%; height: 100%; }

  /* 顶部 save the date —— 替换原 editorial-title */
  .header {
    text-align: center;
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }
  .header-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    letter-spacing: 8px;
    color: #c4683a;
    margin-bottom: 3px;
  }
  .header-zh {
    font-size: 10px;
    letter-spacing: 8px;
    color: #5a7a5e;
    padding-left: 8px;
  }

  /* 圆形 photo 放大 —— 视觉重心 */
  .photo-stage {
    position: relative;
    width: 220px;
    margin: 4px auto 8px;
    z-index: 2;
  }
  .photo-wrap {
    width: 220px;
    height: 220px;
    margin: 0 auto;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    z-index: 2;
    box-shadow: 0 18px 42px rgba(44, 74, 62, 0.22);
    border: 3px solid rgba(255,255,255,0.65);
  }
  .photo-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(90, 122, 94, 0.3);
    pointer-events: none;
  }
  .photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 12%;
    filter: saturate(0.92) brightness(1.02);
  }
  /* decorative laurel around photo —— 同步放大 */
  .photo-laurel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 270px;
    height: 270px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
    color: #5a7a5e;
  }

  .names {
    text-align: center;
    margin-bottom: 8px;
    position: relative; z-index: 2;
  }
  .names-zh {
    font-size: 18px;
    letter-spacing: 5px;
    color: #2c4a3e;
    font-weight: 400;
    margin-bottom: 3px;
  }
  .names-zh .amp {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #c89968;
    font-size: 20px;
    margin: 0 6px;
    font-weight: 400;
  }
  .names-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 3px;
    color: #5a7a5e;
  }

  .info-grid {
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }
  .info-cell {
    text-align: center;
    padding: 4px 0;
    border-bottom: 1px solid rgba(90, 122, 94, 0.2);
  }
  .info-cell:last-child { border-bottom: none; }
  .info-key {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 10px;
    color: #5a7a5e;
    letter-spacing: 3px;
    margin-bottom: 1px;
  }
  .info-val {
    font-size: 11.5px;
    color: #2c4a3e;
    letter-spacing: 0.5px;
    line-height: 1.35;
  }
  .info-val .accent {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #c89968;
    font-size: 14px;
    font-weight: 500;
  }
  .info-val .small {
    font-size: 9.5px;
    color: #5a7a5e;
    margin-top: 1px;
    display: block;
  }

  .footer {
    text-align: center;
    margin-top: auto;
    position: relative; z-index: 2;
  }
  .footer-zh {
    font-size: 11px;
    letter-spacing: 5px;
    color: #c89968;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: transparent; width: 420px; height: 560px; overflow: hidden; }
    body > .card { box-shadow: none; margin: 0; }
  </style></head>
