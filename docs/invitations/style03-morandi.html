<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Johnson & Maria Garcia · Wedding</title>
<link href="https://fonts.font.im/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --paper: #f0ebe1;
    --sage: #b3c4a8;
    --sage-deep: #8ba078;
    --olive: #8ba078;
    --olive-deep: #6b7f5a;
    --ink-green: #2f4a36;
    --soft-green: #5a7a5e;
    --sand: #d4c9ab;
    --sand-deep: #a89a78;
  }
  html, body { background: var(--paper); }
  body {
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
    margin: 0;
  }
  .card {
    width: 420px;
    height: 560px;
    background:
      radial-gradient(ellipse 90% 60% at 70% 15%, rgba(179, 196, 168, 0.32) 0%, transparent 50%),
      radial-gradient(ellipse 100% 70% at 20% 85%, rgba(139, 160, 120, 0.28) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 50% 50%, rgba(212, 201, 171, 0.10) 0%, transparent 60%),
      linear-gradient(170deg, #f3eee3 0%, #e9e0c9 100%);
    position: relative;
    padding: 20px 34px 20px;
    overflow: hidden;
    color: var(--ink-green);
    display: flex;
    flex-direction: column;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-radial-gradient(circle at 15% 25%, transparent 0, transparent 1.5px, rgba(95, 122, 94, 0.03) 1.5px, rgba(95, 122, 94, 0.03) 2.5px);
    pointer-events: none;
    opacity: 0.7;
  }

  /* 水彩晕染 */
  .wash {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .wash-1 {
    width: 180px; height: 180px;
    top: -50px; right: -60px;
    background: radial-gradient(circle, rgba(179, 196, 168, 0.6) 0%, rgba(179, 196, 168, 0.2) 45%, transparent 70%);
    filter: blur(22px);
  }
  .wash-2 {
    width: 150px; height: 150px;
    bottom: -40px; left: -40px;
    background: radial-gradient(circle, rgba(139, 160, 120, 0.5) 0%, rgba(139, 160, 120, 0.16) 45%, transparent 70%);
    filter: blur(20px);
  }
  .wash-3 {
    width: 90px; height: 90px;
    top: 230px; right: 10px;
    background: radial-gradient(circle, rgba(212, 201, 171, 0.22) 0%, transparent 65%);
    filter: blur(16px);
  }

  /* 手绘叶 */
  .botanical {
    position: absolute;
    pointer-events: none;
    z-index: 1;
  }
  .bot-tl { top: 8px; left: 8px; width: 75px; height: 55px; }
  .bot-tr { top: 4px; right: 6px; width: 55px; height: 75px; }
  .bot-bot { bottom: 6px; left: 50%; transform: translateX(-50%); width: 130px; height: 32px; opacity: 0.75; }

  .petal {
    position: absolute;
    width: 6px; height: 9px;
    background: var(--sage);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.55;
    pointer-events: none;
  }
  .petal-1 { top: 70px; left: 80px; transform: rotate(20deg); }
  .petal-2 { top: 240px; right: 38px; transform: rotate(-30deg); }
  .petal-3 { bottom: 110px; left: 30px; transform: rotate(45deg); background: var(--olive); opacity: 0.45; }

  /* 头部 */
  .header {
    text-align: center;
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }
  .header-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--olive-deep);
    margin-bottom: 4px;
  }
  .header-zh {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--soft-green);
    text-transform: uppercase;
    font-weight: 300;
  }

  /* 照片放大 */
  .photo-frame {
    width: 190px;
    margin: 0 auto 8px;
    position: relative;
    z-index: 2;
  }
  .photo-frame::before {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px solid var(--olive);
    border-radius: 50%;
    opacity: 0.5;
    pointer-events: none;
  }
  .photo-wrap {
    width: 190px;
    height: 240px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    box-shadow: 0 12px 26px rgba(47, 74, 54, 0.22);
    background: #fff;
  }
  .photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 12%;
    filter: saturate(0.88) brightness(1.04);
  }

  /* 姓名 */
  .names {
    text-align: center;
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }
  .names-zh {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--ink-green);
    font-weight: 300;
    margin-bottom: 3px;
    line-height: 1.2;
  }
  .names-amp {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--olive);
    font-size: 21px;
    margin: 0 8px;
    font-weight: 500;
    vertical-align: -1px;
  }
  .names-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--soft-green);
  }

  /* 装饰线 */
  .ornate-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 4px 0 6px;
    position: relative; z-index: 2;
  }
  .ornate-line .ln-soft {
    width: 30px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--olive-deep) 50%, transparent);
    opacity: 0.55;
  }
  .ornate-line svg { width: 28px; height: 14px; }

  /* 日期 */
  .date-block {
    text-align: center;
    margin-bottom: 5px;
    position: relative; z-index: 2;
  }
  .date-big {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--ink-green);
    line-height: 1;
    margin-bottom: 3px;
    font-weight: 400;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
  }
  .date-big em {
    font-style: italic;
    color: var(--olive-deep);
    font-weight: 500;
  }
  .date-big .sep {
    font-size: 20px;
    color: var(--olive);
    font-style: italic;
    font-weight: 300;
  }
  .date-line {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--soft-green);
    margin-bottom: 3px;
  }
  .date-zh {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--soft-green);
  }

  /* 信息 */
  .info-block {
    text-align: center;
    margin-bottom: 4px;
    position: relative; z-index: 2;
  }
  .info-row {
    font-size: 12px;
    color: var(--ink-green);
    letter-spacing: 1.5px;
    line-height: 1.55;
  }
  .info-row .accent {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--olive-deep);
    font-weight: 500;
  }

  /* 底部 */
  .footer {
    text-align: center;
    margin-top: auto;
    position: relative; z-index: 2;
  }
  .footer-q {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--olive-deep);
    margin-bottom: 4px;
  }
  .footer-q .accent { color: var(--sand-deep); }
  .footer-zh {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--soft-green);
    text-transform: uppercase;
    font-weight: 300;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: transparent; width: 420px; height: 560px; overflow: hidden; }
    body > .card { box-shadow: none; margin: 0; }
  </style>
  <script>
    (function () {
      window.addEventListener('message', function (e) {
        var d = e && e.data;
        if (!d || d.type !== 'set-photo' || !d.url) return;
        var img = document.getElementById('main-photo');
        if (img) img.setAttribute('src', d.url);
      });
      try { parent.postMessage({ type: 'photo-iframe-ready', id: "style03-morandi" }, '*'); } catch (_) {}
    })();
  </script></head>
<body>
<div class="card">
  <div class="wash wash-1"></div>
  <div class="wash wash-2"></div>
  <div class="wash wash-3"></div>

  <div class="petal petal-1"></div>
  <div class="petal petal-2"></div>
  <div class="petal petal-3"></div>

  <!-- 手绘叶 -->
  <div class="botanical bot-tl">
    <svg viewBox="0 0 75 55" fill="none">
      <path d="M4 50 Q22 33 38 22 Q58 12 70 6" stroke="#6b7f5a" stroke-width="0.8" fill="none"/>
      <ellipse cx="14" cy="44" rx="5" ry="2" transform="rotate(-25 14 44)" fill="#6b7f5a" opacity="0.78"/>
      <ellipse cx="26" cy="33" rx="6" ry="2.3" transform="rotate(-30 26 33)" fill="#b3c4a8" opacity="0.85"/>
      <ellipse cx="38" cy="23" rx="5.5" ry="2.1" transform="rotate(-35 38 23)" fill="#6b7f5a" opacity="0.8"/>
      <ellipse cx="52" cy="15" rx="6" ry="2.3" transform="rotate(-30 52 15)" fill="#b3c4a8" opacity="0.85"/>
      <g transform="translate(48, 12)">
        <circle cx="0" cy="-2" r="1.8" fill="#8ba078" opacity="0.9"/>
        <circle cx="-2" cy="0" r="1.8" fill="#8ba078" opacity="0.85"/>
        <circle cx="2" cy="0" r="1.8" fill="#8ba078" opacity="0.85"/>
        <circle cx="0" cy="2" r="1.8" fill="#8ba078" opacity="0.8"/>
        <circle cx="0" cy="0" r="1.2" fill="#d4c9ab"/>
      </g>
    </svg>
  </div>

  <div class="botanical bot-tr">
    <svg viewBox="0 0 55 75" fill="none">
      <path d="M50 4 Q36 22 28 38 Q18 56 6 70" stroke="#6b7f5a" stroke-width="0.8" fill="none"/>
      <ellipse cx="44" cy="14" rx="5" ry="2" transform="rotate(35 44 14)" fill="#6b7f5a" opacity="0.78"/>
      <ellipse cx="34" cy="26" rx="6" ry="2.3" transform="rotate(40 34 26)" fill="#b3c4a8" opacity="0.85"/>
      <ellipse cx="26" cy="40" rx="5.5" ry="2.1" transform="rotate(50 26 40)" fill="#6b7f5a" opacity="0.8"/>
      <ellipse cx="14" cy="56" rx="6" ry="2.3" transform="rotate(45 14 56)" fill="#b3c4a8" opacity="0.85"/>
      <g transform="translate(28, 35)">
        <circle cx="0" cy="-2" r="1.8" fill="#8ba078" opacity="0.9"/>
        <circle cx="-2" cy="0" r="1.8" fill="#8ba078" opacity="0.85"/>
        <circle cx="2" cy="0" r="1.8" fill="#8ba078" opacity="0.85"/>
        <circle cx="0" cy="2" r="1.8" fill="#8ba078" opacity="0.8"/>
        <circle cx="0" cy="0" r="1.2" fill="#d4c9ab"/>
      </g>
    </svg>
  </div>

  <div class="botanical bot-bot">
    <svg viewBox="0 0 130 36" fill="none">
      <path d="M6 18 Q40 8 65 18 Q90 28 124 18" stroke="#6b7f5a" stroke-width="0.7" fill="none"/>
      <ellipse cx="22" cy="17" rx="5" ry="1.8" transform="rotate(-15 22 17)" fill="#b3c4a8" opacity="0.8"/>
      <ellipse cx="40" cy="13" rx="5" ry="1.8" transform="rotate(-5 40 13)" fill="#6b7f5a" opacity="0.8"/>
      <ellipse cx="65" cy="20" rx="5" ry="1.8" fill="#6b7f5a" opacity="0.85"/>
      <ellipse cx="90" cy="23" rx="5" ry="1.8" transform="rotate(10 90 23)" fill="#b3c4a8" opacity="0.85"/>
      <ellipse cx="108" cy="20" rx="5" ry="1.8" transform="rotate(15 108 20)" fill="#6b7f5a" opacity="0.8"/>
      <g transform="translate(65, 16)">
        <circle cx="0" cy="-2.5" r="2" fill="#8ba078"/>
        <circle cx="-2.5" cy="0" r="2" fill="#8ba078"/>
        <circle cx="2.5" cy="0" r="2" fill="#8ba078"/>
        <circle cx="0" cy="2.5" r="2" fill="#8ba078"/>
        <circle cx="0" cy="0" r="1.3" fill="#d4c9ab"/>
      </g>
    </svg>
  </div>

  <!-- header -->
  <div class="header">
    <div class="header-en">save the date</div>
    <div class="header-zh">10.01.2099</div>
  </div>

  <!-- 照片 -->
  <div class="photo-frame">
    <div class="photo-wrap">
      <img id="main-photo" src="../photos/style03-morandi.jpg" alt="新人">
    </div>
  </div>

  <!-- 姓名 -->
  <div class="names">
    <div class="names-zh">Alex<span class="names-amp">&</span>Maria</div>
    <div class="names-en">ALEX JOHNSON &nbsp;·&nbsp; MARIA GARCIA</div>
  </div>

  <!-- 分隔线 -->
  <div class="ornate-line">
    <span class="ln-soft"></span>
    <svg viewBox="0 0 28 14" fill="none">
      <ellipse cx="5" cy="8" rx="3.5" ry="1.6" transform="rotate(-20 5 8)" fill="#b3c4a8" opacity="0.85"/>
      <ellipse cx="23" cy="8" rx="3.5" ry="1.6" transform="rotate(20 23 8)" fill="#b3c4a8" opacity="0.85"/>
      <circle cx="14" cy="7" r="2.2" fill="#8ba078"/>
      <circle cx="14" cy="7" r="0.9" fill="#d4c9ab"/>
    </svg>
    <span class="ln-soft"></span>
  </div>

  <!-- 日期 -->
  <div class="date-block">
    <div class="date-big">
      <span>10</span><span class="sep">·</span><span><em>01</em></span>
    </div>
    <div class="date-line">October 1, 2099 · Monday</div>
    <div class="date-zh">at 18:00, reception to follow</div>
  </div>

  <!-- info -->
  <div class="info-block">
    <div class="info-row"><span class="accent">Singapore</span></div>
    <div class="info-row" style="margin-top:2px;font-size:11px;">80 Collyer Quay, Marina Bay · The Fullerton Bay Hotel</div>
  </div>

  <!-- footer -->
  <div class="footer">
    <div class="footer-q">"by the sea, our summer <span class="accent">begins</span>"</div>
    <div class="footer-zh">with love, please join us</div>
  </div>
</div>
</body>
</html>
