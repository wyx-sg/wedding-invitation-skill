<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALEX JOHNSON & MARIA GARCIA · Modern Minimal</title>
<link href="https://fonts.font.im/css2?family=Inter:wght@200;300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #181818;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 0;
  }
  .card {
    width: 420px;
    height: 560px;
    background: #fafaf7;
    position: relative;
    padding: 30px 36px 28px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    overflow: hidden;
    color: #0a0a0a;
    display: flex;
    flex-direction: column;
  }

  /* top eyebrow */
  .header {
    text-align: center;
    margin-bottom: 14px;
  }
  .header-main {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 5px;
    color: #B8956A;
    margin-bottom: 6px;
  }
  .header-sub {
    font-family: 'Inter', sans-serif;
    font-size: 9.5px;
    letter-spacing: 5px;
    color: #8b8680;
    font-weight: 300;
    text-transform: uppercase;
  }

  /* oval photo — visual focal point */
  .photo-frame {
    width: 180px;
    margin: 0 auto 14px;
    position: relative;
  }
  .photo-frame::before {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px solid #B8956A;
    border-radius: 50%;
    opacity: 0.45;
    pointer-events: none;
  }
  .photo-wrap {
    width: 180px;
    height: 230px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    box-shadow: 0 16px 36px rgba(0,0,0,0.14);
    background: #fff;
  }
  .photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 12%;
    filter: contrast(1.02) saturate(0.95);
  }

  /* names */
  .names {
    text-align: center;
    margin-bottom: 10px;
  }
  .names-primary {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 4px;
    color: #0a0a0a;
  }
  .names-amp {
    font-style: italic;
    color: #B8956A;
    margin: 0 6px;
    font-size: 26px;
  }
  .names-sub {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 4px;
    color: #8b8680;
    font-weight: 300;
  }

  /* divider */
  .ornate-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 8px 0 14px;
  }
  .ornate-line .ln {
    width: 36px; height: 1px;
    background: linear-gradient(90deg, transparent, #B8956A 50%, transparent);
    opacity: 0.55;
  }
  .ornate-line .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #B8956A;
    opacity: 0.7;
  }

  /* date */
  .date-block {
    text-align: center;
    margin-bottom: 12px;
  }
  .date-big {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: #0a0a0a;
    line-height: 1;
    margin-bottom: 6px;
    font-weight: 300;
    letter-spacing: 2px;
  }
  .date-big em {
    font-style: italic;
    color: #B8956A;
    font-weight: 400;
    margin: 0 4px;
  }
  .date-sub {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 4px;
    color: #8b8680;
    text-transform: uppercase;
  }

  /* time + venue */
  .info-block {
    text-align: center;
    margin-bottom: 8px;
  }
  .info-row {
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    color: #0a0a0a;
    letter-spacing: 1px;
    line-height: 1.55;
  }
  .info-row em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #B8956A;
    font-size: 14px;
    font-weight: 500;
  }
  .info-row .sub {
    font-size: 10px;
    color: #8b8680;
  }

  .footer {
    margin-top: auto;
    text-align: center;
  }
  .footer-main {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: #B8956A;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .footer-sub {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 5px;
    color: #8b8680;
    text-transform: uppercase;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: transparent; width: 420px; height: 560px; overflow: hidden; }
    body > .card { box-shadow: none; margin: 0; }
  </style>
  <script>
    (function () {
      window.addEventListener('message', function (e) {
        var d = e && e.data;
        if (!d || d.type !== 'set-photo' || !d.url) return;
        var img = document.getElementById('main-photo');
        if (img) img.setAttribute('src', d.url);
      });
      try { parent.postMessage({ type: 'photo-iframe-ready', id: "style02-modern-minimal" }, '*'); } catch (_) {}
    })();
  </script></head>
<body>
<div class="card">
  <!-- top eyebrow -->
  <div class="header">
    <div class="header-main">save the date</div>
    <div class="header-sub">10.01.2099</div>
  </div>

  <!-- oval photo -->
  <div class="photo-frame">
    <div class="photo-wrap">
      <img id="main-photo" src="../photos/style02-modern-minimal.jpg" alt="couple">
    </div>
  </div>

  <!-- names -->
  <div class="names">
    <div class="names-primary">Alex<span class="names-amp">&</span>Maria</div>
    <div class="names-sub">ALEX JOHNSON &nbsp;·&nbsp; MARIA GARCIA</div>
  </div>

  <!-- divider -->
  <div class="ornate-line">
    <span class="ln"></span>
    <span class="dot"></span>
    <span class="ln"></span>
  </div>

  <!-- date -->
  <div class="date-block">
    <div class="date-big">October 1, 2099</div>
    <div class="date-sub">Monday <em>·</em> 18:00</div>
  </div>

  <!-- venue -->
  <div class="info-block">
    <div class="info-row">80 Collyer Quay, Marina Bay</div>
    <div class="info-row sub" style="font-size:10.5px;color:#8b8680;margin-top:2px;">The Fullerton Bay Hotel</div>
  </div>

  <!-- footer -->
  <div class="footer">
    <div class="footer-main">with all our love</div>
    <div class="footer-sub">please join us</div>
  </div>
</div>
</body>
</html>
