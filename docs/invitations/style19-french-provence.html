<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alexandre Dubois & Camille Laurent · Mariage</title>
<link href="https://fonts.font.im/css2?family=Allura&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+SC:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a2438; font-family: 'EB Garamond', 'Noto Serif SC', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 420px; height: 560px;
    background: linear-gradient(180deg, #f5f1e8 0%, #ece4d4 100%);
    color: #4a3a4a;
    position: relative;
    overflow: hidden;
    padding: 24px;
  }
  /* Soft subtle frame */
  .frame {
    position: absolute; inset: 16px;
    border: 1px solid #a08fbf;
    opacity: 0.45;
    pointer-events: none;
  }
  /* Lavender sprigs top — arched over names */
  .lavender-top {
    position: absolute;
    top: 32px; left: 50%;
    transform: translateX(-50%);
    width: 240px; height: 60px;
    pointer-events: none;
    z-index: 2;
  }
  .lavender-top svg { width: 100%; height: 100%; }
  /* Botanical line art around photo */
  .botanical-l, .botanical-r {
    position: absolute;
    top: 200px;
    width: 60px; height: 180px;
    pointer-events: none;
    opacity: 0.65;
  }
  .botanical-l { left: 12px; }
  .botanical-r { right: 12px; transform: scaleX(-1); }
  .botanical-l svg, .botanical-r svg { width: 100%; height: 100%; }

  .content {
    position: relative; z-index: 1;
    text-align: center;
    padding-top: 96px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .top-script {
    font-family: 'Allura', cursive;
    font-size: 26px;
    color: #a08fbf;
    line-height: 1;
    margin-bottom: 4px;
  }
  .top-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 9px;
    letter-spacing: 8px;
    color: #8a9882;
  }
  .photo-wrap {
    width: 158px; height: 200px;
    margin: 14px auto 14px;
    border-radius: 50% 50% 4px 4px / 30% 30% 4px 4px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(74, 58, 74, 0.18);
    border: 1px solid #d4c8d8;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center 12%; }
  .monogram {
    font-family: 'Allura', cursive;
    font-size: 60px;
    color: #a08fbf;
    line-height: 0.9;
    margin: 4px 0 2px;
  }
  .names-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: #4a3a4a;
    margin-top: 2px;
  }
  .names-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: #8a7a8a;
    margin-top: 4px;
  }
  .divider {
    margin: 12px auto;
    width: 80px;
    height: 8px;
    background-image:
      radial-gradient(circle at 8px 4px, #a08fbf 1.5px, transparent 1.5px),
      radial-gradient(circle at 40px 4px, #c8a040 2px, transparent 2px),
      radial-gradient(circle at 72px 4px, #a08fbf 1.5px, transparent 1.5px);
    background-size: 80px 8px;
    background-repeat: no-repeat;
  }
  .info {
    font-family: 'EB Garamond', serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: #4a3a4a;
    line-height: 1.7;
    margin-top: auto;
    padding-bottom: 8px;
  }
  .info .date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: #a08fbf;
    letter-spacing: 4px;
    display: block;
    margin-bottom: 2px;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: transparent; width: 420px; height: 560px; overflow: hidden; }
    body > .card { box-shadow: none; margin: 0; }
  </style></head>
