<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>김민준 & 이서연 · 결혼식</title>
<link href="https://fonts.font.im/css2?family=Nanum+Myeongjo:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e1f12; font-family: 'Nanum Myeongjo', 'Noto Serif SC', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 420px; height: 560px;
    background: #f5ede0;
    color: #2a4a32;
    position: relative;
    overflow: hidden;
  }
  /* Top emerald band with traditional Korean motif */
  .top-band {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 96px;
    background: linear-gradient(180deg, #326b3c 0%, #285030 100%);
  }
  /* Korean traditional knot (kkwaegi) at center top */
  .knot {
    position: absolute;
    top: 22px; left: 50%;
    transform: translateX(-50%);
    width: 64px; height: 64px;
    z-index: 2;
  }
  .knot svg { width: 100%; height: 100%; }
  /* Side panels with persimmon/lotus motifs */
  .side-l, .side-r {
    position: absolute;
    top: 130px;
    width: 38px; height: 280px;
    pointer-events: none;
    opacity: 0.55;
  }
  .side-l { left: 16px; }
  .side-r { right: 16px; transform: scaleX(-1); }
  .side-l svg, .side-r svg { width: 100%; height: 100%; }

  /* Bottom rose-band */
  .bottom-band {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 22px;
    background: linear-gradient(90deg, #c9817e 0%, #c8a040 100%);
    opacity: 0.85;
  }

  .content {
    position: relative; z-index: 1;
    text-align: center;
    padding: 110px 56px 40px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .top-label {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 18px;
    letter-spacing: 14px;
    color: #2a4a32;
    margin-bottom: 2px;
  }
  .top-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 10px;
    letter-spacing: 6px;
    color: #c8a040;
    margin-bottom: 10px;
  }
  /* Photo with gold-bordered arched top (traditional Korean royal portrait frame) */
  .photo-wrap {
    width: 160px; height: 196px;
    margin: 4px auto 14px;
    border-radius: 80px 80px 4px 4px;
    overflow: hidden;
    border: 2px solid #c8a040;
    box-shadow:
      0 0 0 4px #f5ede0,
      0 0 0 5px #326b3c,
      0 6px 14px rgba(0,0,0,0.18);
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center 12%; }

  .names-zh {
    font-size: 22px;
    letter-spacing: 6px;
    color: #2a4a32;
    margin-top: 6px;
  }
  .names-zh .amp {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #c8a040;
    margin: 0 5px;
  }
  .names-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 4px;
    color: #c9817e;
    margin-top: 3px;
  }
  .divider {
    width: 80px;
    height: 1px;
    margin: 12px auto;
    background: linear-gradient(90deg, transparent, #c8a040, transparent);
  }
  .info {
    font-size: 11px;
    color: #2a4a32;
    letter-spacing: 3px;
    line-height: 1.8;
    margin-top: auto;
    padding-bottom: 8px;
  }
  .info .date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: #326b3c;
    letter-spacing: 3px;
    display: block;
    margin-bottom: 2px;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: transparent; width: 420px; height: 560px; overflow: hidden; }
    body > .card { box-shadow: none; margin: 0; }
  </style></head>
