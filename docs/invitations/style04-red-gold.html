<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林知言 & 沈安然 · 婚礼请帖</title>
<link href="https://fonts.font.im/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0606;
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px 0;
  }
  .card {
    width: 420px;
    height: 560px;
    background:
      radial-gradient(circle at center, #d42a2a 0%, #b8121a 70%, #8b0a14 100%);
    position: relative;
    padding: 26px 24px 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    color: #f9e3a1;
  }
  /* double gold frame */
  .card::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1.5px solid #d4af37;
    pointer-events: none;
    border-radius: 2px;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 15px;
    border: 1px solid #d4af37;
    opacity: 0.55;
    pointer-events: none;
  }

  /* compact gold corners */
  .gold-corner {
    position: absolute;
    width: 32px; height: 32px;
    color: #d4af37;
    z-index: 3;
  }
  .gold-corner.tl { top: 18px; left: 18px; }
  .gold-corner.tr { top: 18px; right: 18px; transform: scaleX(-1); }
  .gold-corner.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
  .gold-corner.br { bottom: 18px; right: 18px; transform: scale(-1,-1); }

  .double-xi {
    text-align: center;
    margin-bottom: 6px;
    position: relative; z-index: 2;
    padding-top: 4px;
  }
  .xi-char {
    display: inline-block;
    font-size: 46px;
    color: #ffd86b;
    font-weight: 900;
    text-shadow:
      0 0 14px rgba(255,216,107,0.5),
      2px 2px 0 #8b0a14;
    line-height: 1;
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  }
  .xi-sub {
    font-size: 10px;
    letter-spacing: 6px;
    color: #ffd86b;
    margin-top: 4px;
    font-weight: 500;
  }

  .ornament-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 8px 24px 10px;
    position: relative; z-index: 2;
  }
  .ornament-line .line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #d4af37 50%, transparent);
  }
  .ornament-line .dot {
    color: #d4af37; font-size: 8px;
  }

  .photo-frame {
    width: 150px;
    margin: 0 auto 8px;
    position: relative;
    z-index: 2;
  }
  .photo-wrap {
    width: 150px;
    height: 188px;
    border-radius: 50%;
    overflow: hidden;
    border: 2.5px solid #d4af37;
    box-shadow:
      0 0 0 1px #8b6a1a inset,
      0 10px 24px rgba(0,0,0,0.4);
    background: #fff;
  }
  .photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 12%;
  }
  .tassel {
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    color: #d4af37;
    font-size: 16px;
    z-index: 3;
  }

  .names {
    text-align: center;
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }
  .names-zh {
    font-size: 22px;
    color: #ffd86b;
    letter-spacing: 6px;
    font-weight: 500;
    font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .names-zh .heart {
    color: #ffd86b;
    margin: 0 4px;
    font-size: 16px;
  }
  .names-en {
    font-size: 9px;
    letter-spacing: 3px;
    color: #f9e3a1;
    margin-top: 4px;
    opacity: 0.85;
  }

  .seal-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 8px 16px 10px;
    position: relative; z-index: 2;
  }
  .seal-divider .ln {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #d4af37 50%, transparent);
  }
  .seal-divider .stamp {
    width: 26px; height: 26px;
    background: #ffd86b;
    color: #8b0a14;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
    border-radius: 2px;
    font-family: 'ZCOOL XiaoWei', serif;
  }

  /* compact 4-line info */
  .info-block {
    background: rgba(255, 216, 107, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.4);
    padding: 10px 14px;
    margin: 0 6px 8px;
    position: relative; z-index: 2;
  }
  .info-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 11px;
    line-height: 1.6;
    color: #f9e3a1;
    letter-spacing: 1px;
  }
  .info-row + .info-row { margin-top: 2px; }
  .info-row .k {
    color: #ffd86b;
    font-weight: 500;
    letter-spacing: 3px;
    flex-shrink: 0;
    width: 38px;
  }
  .info-row .v { flex: 1; }
  .info-row .v .big {
    color: #ffd86b;
    font-weight: 700;
    font-size: 12px;
  }

  .footer {
    text-align: center;
    margin-top: 6px;
    position: relative; z-index: 2;
  }
  .footer-zh {
    font-size: 11px;
    letter-spacing: 5px;
    color: #ffd86b;
    font-weight: 500;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: transparent; width: 420px; height: 560px; overflow: hidden; }
    body > .card { box-shadow: none; margin: 0; }
  </style></head>
