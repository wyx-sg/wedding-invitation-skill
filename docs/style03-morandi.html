<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林知言 & 沈安然 · 婚礼请帖</title>
<link href="https://fonts.font.im/css2?family=Noto+Serif+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --paper: #f0ebe1;
    --sage: #b3c4a8;
    --sage-deep: #8ba078;
    --olive: #8ba078;
    --olive-deep: #6b7f5a;
    --ink-green: #2f4a36;
    --soft-green: #5a7a5e;
    --sand: #d4c9ab;
    --sand-deep: #a89a78;
  }
  html, body { background: var(--paper); }
  body {
    font-family: 'Noto Serif SC', serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
    margin: 0;
  }
  .card {
    width: 420px;
    height: 560px;
    background:
      radial-gradient(ellipse 90% 60% at 70% 15%, rgba(179, 196, 168, 0.32) 0%, transparent 50%),
      radial-gradient(ellipse 100% 70% at 20% 85%, rgba(139, 160, 120, 0.28) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 50% 50%, rgba(212, 201, 171, 0.10) 0%, transparent 60%),
      linear-gradient(170deg, #f3eee3 0%, #e9e0c9 100%);
    position: relative;
    padding: 20px 34px 20px;
    overflow: hidden;
    color: var(--ink-green);
    display: flex;
    flex-direction: column;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-radial-gradient(circle at 15% 25%, transparent 0, transparent 1.5px, rgba(95, 122, 94, 0.03) 1.5px, rgba(95, 122, 94, 0.03) 2.5px);
    pointer-events: none;
    opacity: 0.7;
  }

  /* 水彩晕染 */
  .wash {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .wash-1 {
    width: 180px; height: 180px;
    top: -50px; right: -60px;
    background: radial-gradient(circle, rgba(179, 196, 168, 0.6) 0%, rgba(179, 196, 168, 0.2) 45%, transparent 70%);
    filter: blur(22px);
  }
  .wash-2 {
    width: 150px; height: 150px;
    bottom: -40px; left: -40px;
    background: radial-gradient(circle, rgba(139, 160, 120, 0.5) 0%, rgba(139, 160, 120, 0.16) 45%, transparent 70%);
    filter: blur(20px);
  }
  .wash-3 {
    width: 90px; height: 90px;
    top: 230px; right: 10px;
    background: radial-gradient(circle, rgba(212, 201, 171, 0.22) 0%, transparent 65%);
    filter: blur(16px);
  }

  /* 手绘叶 */
  .botanical {
    position: absolute;
    pointer-events: none;
    z-index: 1;
  }
  .bot-tl { top: 8px; left: 8px; width: 75px; height: 55px; }
  .bot-tr { top: 4px; right: 6px; width: 55px; height: 75px; }
  .bot-bot { bottom: 6px; left: 50%; transform: translateX(-50%); width: 130px; height: 32px; opacity: 0.75; }

  .petal {
    position: absolute;
    width: 6px; height: 9px;
    background: var(--sage);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.55;
    pointer-events: none;
  }
  .petal-1 { top: 70px; left: 80px; transform: rotate(20deg); }
  .petal-2 { top: 240px; right: 38px; transform: rotate(-30deg); }
  .petal-3 { bottom: 110px; left: 30px; transform: rotate(45deg); background: var(--olive); opacity: 0.45; }

  /* 头部 */
  .header {
    text-align: center;
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }
  .header-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--olive-deep);
    margin-bottom: 4px;
  }
  .header-zh {
    font-size: 10px;
    letter-spacing: 8px;
    color: var(--soft-green);
    padding-left: 8px;
  }

  /* 照片放大 */
  .photo-frame {
    width: 190px;
    margin: 0 auto 8px;
    position: relative;
    z-index: 2;
  }
  .photo-frame::before {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px solid var(--olive);
    border-radius: 50%;
    opacity: 0.5;
    pointer-events: none;
  }
  .photo-wrap {
    width: 190px;
    height: 240px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    box-shadow: 0 12px 26px rgba(47, 74, 54, 0.22);
    background: #fff;
  }
  .photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 12%;
    filter: saturate(0.88) brightness(1.04);
  }

  /* 姓名 */
  .names {
    text-align: center;
    margin-bottom: 6px;
    position: relative; z-index: 2;
  }
  .names-zh {
    font-size: 19px;
    letter-spacing: 3px;
    color: var(--ink-green);
    font-weight: 400;
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .names-amp {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--olive);
    font-size: 21px;
    margin: 0 8px;
    font-weight: 500;
    vertical-align: -1px;
  }
  .names-en {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--soft-green);
  }

  /* 装饰线 */
  .ornate-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 4px 0 6px;
    position: relative; z-index: 2;
  }
  .ornate-line .ln-soft {
    width: 30px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--olive-deep) 50%, transparent);
    opacity: 0.55;
  }
  .ornate-line svg { width: 28px; height: 14px; }

  /* 日期 */
  .date-block {
    text-align: center;
    margin-bottom: 5px;
    position: relative; z-index: 2;
  }
  .date-big {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--ink-green);
    line-height: 1;
    margin-bottom: 3px;
    font-weight: 400;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
  }
  .date-big em {
    font-style: italic;
    color: var(--olive-deep);
    font-weight: 500;
  }
  .date-big .sep {
    font-size: 20px;
    color: var(--olive);
    font-style: italic;
    font-weight: 300;
  }
  .date-line {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--soft-green);
    margin-bottom: 3px;
  }
  .date-zh {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--soft-green);
  }

  /* 信息 */
  .info-block {
    text-align: center;
    margin-bottom: 4px;
    position: relative; z-index: 2;
  }
  .info-row {
    font-size: 12px;
    color: var(--ink-green);
    letter-spacing: 1.5px;
    line-height: 1.55;
  }
  .info-row .accent {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--olive-deep);
    font-weight: 500;
  }

  /* 底部 */
  .footer {
    text-align: center;
    margin-top: auto;
    position: relative; z-index: 2;
  }
  .footer-q {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--olive-deep);
    margin-bottom: 4px;
  }
  .footer-q .accent { color: var(--sand-deep); }
  .footer-zh {
    font-size: 11px;
    letter-spacing: 7px;
    color: var(--soft-green);
    padding-left: 7px;
  }
</style>
<style id="__pages_frame__">
    html, body { margin: 0; padding: 0; background: #15110d; min-height: 100vh; }
    body { display: flex; align-items: center; justify-content: center; padding: 24px 0; }
    body > .card { box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55); }
  </style></head>
