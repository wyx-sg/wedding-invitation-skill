<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{site.title}}</title>
<link href="https://fonts.font.im/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2a0e16; font-family: 'Noto Serif SC', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 420px; height: 560px;
    background: radial-gradient(circle at 50% -10%, #a83344 0%, #7a1f2e 45%, #5a1521 100%);
    color: #f4d8a0;
    position: relative;
    overflow: hidden;
    padding: 24px;
  }
  .border-frame {
    position: absolute; inset: 10px;
    border: 1.5px solid #d4a02a;
    border-radius: 2px;
    pointer-events: none;
  }
  .border-frame::after {
    content: '';
    position: absolute; inset: 4px;
    border: 0.5px solid #d4a02a;
    opacity: 0.6;
  }
  /* Big mandala at top */
  .mandala {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 90px; height: 90px;
    z-index: 2;
  }
  .mandala svg { width: 100%; height: 100%; }
  /* Paisley flourishes on both sides */
  .paisley-left, .paisley-right {
    position: absolute;
    top: 240px;
    width: 56px; height: 110px;
    opacity: 0.5;
    pointer-events: none;
  }
  .paisley-left { left: 14px; }
  .paisley-right { right: 14px; transform: scaleX(-1); }
  .paisley-left svg, .paisley-right svg { width: 100%; height: 100%; }
  /* Bottom lotus row */
  .lotus-row {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    width: 220px; height: 30px;
    opacity: 0.6;
    pointer-events: none;
  }
  .lotus-row svg { width: 100%; height: 100%; }
  .content { position: relative; z-index: 1; padding-top: 124px; text-align: center; }
  .greeting {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 8px;
    color: #e8a042;
    margin-bottom: 6px;
  }
  .photo-wrap {
    width: 150px; height: 150px;
    margin: 8px auto 18px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #d4a02a;
    box-shadow: 0 0 0 4px #5a1521, 0 0 0 5px #d4a02a, 0 0 0 9px #5a1521, 0 0 0 10px #c8843a;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center 12%; }
  .names-zh {
    font-size: 22px;
    letter-spacing: 7px;
    color: #f4d8a0;
    margin-bottom: 4px;
  }
  .names-zh .amp {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: #e8a042;
    margin: 0 6px;
  }
  .names-en {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 4px;
    color: #e8a042;
    margin-bottom: 16px;
  }
  .divider {
    width: 120px;
    height: 1px;
    margin: 0 auto 14px;
    background: linear-gradient(90deg, transparent, #d4a02a, transparent);
  }
  .date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: #f4d8a0;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .date-sub {
    font-size: 10px;
    color: #e8a042;
    letter-spacing: 4px;
  }
  .venue {
    margin-top: 14px;
    font-size: 10.5px;
    color: #f4d8a0;
    letter-spacing: 2px;
    line-height: 1.6;
    opacity: 0.9;
    padding: 0 20px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="border-frame"></div>

  <div class="mandala">
    <svg viewBox="0 0 90 90" fill="none">
      <!-- Outer ring petals -->
      <g stroke="#d4a02a" stroke-width="1" fill="none">
        <circle cx="45" cy="45" r="42"/>
        <circle cx="45" cy="45" r="32"/>
        <circle cx="45" cy="45" r="22"/>
      </g>
      <!-- 8 petals -->
      <g fill="#d4a02a" opacity="0.85">
        <ellipse cx="45" cy="12" rx="3" ry="8"/>
        <ellipse cx="45" cy="78" rx="3" ry="8"/>
        <ellipse cx="12" cy="45" rx="8" ry="3"/>
        <ellipse cx="78" cy="45" rx="8" ry="3"/>
        <ellipse cx="22" cy="22" rx="3" ry="8" transform="rotate(-45 22 22)"/>
        <ellipse cx="68" cy="22" rx="3" ry="8" transform="rotate(45 68 22)"/>
        <ellipse cx="22" cy="68" rx="3" ry="8" transform="rotate(45 22 68)"/>
        <ellipse cx="68" cy="68" rx="3" ry="8" transform="rotate(-45 68 68)"/>
      </g>
      <!-- center -->
      <circle cx="45" cy="45" r="6" fill="#e8a042"/>
      <circle cx="45" cy="45" r="3" fill="#5a1521"/>
    </svg>
  </div>

  <div class="paisley-left">
    <svg viewBox="0 0 56 110" fill="none">
      <path d="M28 10 Q48 30 40 60 Q34 80 28 100 Q22 80 16 60 Q8 30 28 10 Z"
            stroke="#d4a02a" stroke-width="1" fill="none"/>
      <path d="M28 26 Q40 38 36 56 Q32 70 28 84 Q24 70 20 56 Q16 38 28 26 Z"
            stroke="#e8a042" stroke-width="0.7" fill="none" opacity="0.7"/>
      <circle cx="28" cy="50" r="2" fill="#d4a02a"/>
    </svg>
  </div>
  <div class="paisley-right">
    <svg viewBox="0 0 56 110" fill="none">
      <path d="M28 10 Q48 30 40 60 Q34 80 28 100 Q22 80 16 60 Q8 30 28 10 Z"
            stroke="#d4a02a" stroke-width="1" fill="none"/>
      <path d="M28 26 Q40 38 36 56 Q32 70 28 84 Q24 70 20 56 Q16 38 28 26 Z"
            stroke="#e8a042" stroke-width="0.7" fill="none" opacity="0.7"/>
      <circle cx="28" cy="50" r="2" fill="#d4a02a"/>
    </svg>
  </div>

  <div class="content">
    <div class="greeting">— SHUBH VIVAH —</div>
    <div class="photo-wrap">
      <img id="main-photo" src="{{design.primary_photo_url}}" alt="couple">
    </div>
    <div class="names-zh">{{names.groom_zh}}<span class="amp">&</span>{{names.bride_zh}}</div>
    <div class="names-en">{{names.groom_en}} · {{names.bride_en}}</div>
    <div class="divider"></div>
    <div class="date">{{date.en_long}}</div>
    <div class="date-sub">{{date.weekday_en}} · {{time.value}}</div>
    <div class="venue">{{venue.city_zh}}<br>{{venue.lines_zh.0}}</div>
  </div>

  <div class="lotus-row">
    <svg viewBox="0 0 220 30" fill="none">
      <g stroke="#d4a02a" stroke-width="0.8" fill="none">
        <path d="M30 22 Q30 8 20 14 M30 22 Q30 8 40 14 M30 22 Q22 18 18 24 M30 22 Q38 18 42 24"/>
        <circle cx="30" cy="22" r="2.5" fill="#d4a02a"/>
        <path d="M110 22 Q110 4 96 12 M110 22 Q110 4 124 12 M110 22 Q98 16 92 24 M110 22 Q122 16 128 24 M110 22 Q104 10 104 22 M110 22 Q116 10 116 22"/>
        <circle cx="110" cy="22" r="3" fill="#e8a042"/>
        <path d="M190 22 Q190 8 180 14 M190 22 Q190 8 200 14 M190 22 Q182 18 178 24 M190 22 Q198 18 202 24"/>
        <circle cx="190" cy="22" r="2.5" fill="#d4a02a"/>
      </g>
    </svg>
  </div>
</div>
</body>
</html>
